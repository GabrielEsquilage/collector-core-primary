services:
  - type: web
    name: collector-core-primary
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORTAL_TRANSPARENCIA_API_KEY
        sync: false
      - key: PORTAL_TRANSPARENCIA_BASE_URL
        value: https://api.portaldatransparencia.gov.br/api-de-dados
      - key: IBGE_SYNC_ON_STARTUP
        value: false
      - key: TRANSPARENCIA_SYNC_ON_STARTUP
        value: false
